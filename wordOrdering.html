<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Word Ordering</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h1 { color: #20335d; margin: 0 0 20px 0; }
        .input-group { margin: 15px 0; }
        #wordInput { width: 350px; padding: 3px; border: 1px solid #767676; }
        .buttons { margin: 15px 0; }
        button { padding: 2px 10px; margin-right: 5px; cursor: pointer; }
        #message { margin-top: 20px; min-height: 20px; }
    </style>
</head>
<body>

    <h1>Word Ordering</h1>
    <p><strong>Enter a list of words separated by spaces.</strong></p>

    <div class="input-group">
        <label>Word list: <input type="text" id="wordInput"></label>
    </div>

    <div class="buttons">
        <button onclick="processWords('alpha')">Alphabetical</button>
        <button onclick="processWords('reverse')">Reverse alphabetical</button>
        <button onclick="processWords('random')">Random</button>
    </div>

    <div id="message"></div>

    <script src="wordOrdering.js"></script>
</body>
</html>
