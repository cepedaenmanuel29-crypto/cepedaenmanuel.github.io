<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child's Animal Alphabet</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1869/1869685.png" type="image/png">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f7fee7;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #ef4444;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        /* Nav: A | B | C | D | E */
        nav {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 40px;
        }

        nav a {
            text-decoration: none; /* No underline */
            color: #0ea5e9;
            padding: 5px 15px;
            border-radius: 12px;
            transition: 0.3s;
        }

        nav a:hover {
            background-color: #facc15;
            color: #fff;
        }

        /* Grid Layout: 3 columns */
        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .animal-card {
            background: #ffffff;
            border: 4px solid #86efac;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .animal-label {
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #1e40af;
        }

        .animal-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        audio {
            width: 100%;
        }

        .under-construction {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
            font-style: italic;
        }

        .uc-icon {
            width: 40px;
            height: 40px;
            margin-top: 10px;
        }

        footer {
            margin-top: 60px;
            padding-bottom: 40px;
        }

        .back-top {
            text-decoration: none;
            color: #ef4444;
            font-weight: bold;
            border: 2px solid #ef4444;
            padding: 10px 25px;
            border-radius: 50px;
        }

        .back-top:hover {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body>

    <header id="top">
        <h1>Child's Animal Alphabet</h1>
        <nav>
            <a href="#A">A</a> | <a href="#B">B</a> | <a href="#C">C</a> | <a href="#D">D</a> | <a href="#E">E</a>
        </nav>
    </header>

    <main class="alphabet-grid">

        <section id="A" class="animal-card">
            <div class="animal-label">Anteater</div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Giant_Anteater_05.jpg/640px-Giant_Anteater_05.jpg" alt="Anteater">
            <audio controls>
                <source src="https://www.zapsplat.com/wp-content/uploads/edd/animal_anteater_grunt_001.mp3" type="audio/mpeg">
                Your browser does not support audio.
            </audio>
        </section>

        <section id="B" class="animal-card">
            <div class="animal-label">Bear</div>
            <img src="https://images.unsplash.com/photo-1530595467537-0b5996c41f2d?w=400" alt="Bear">
            <audio controls>
                <source src="https://www.w3schools.com/tags/horse.mp3" type="audio/mpeg">
            </audio>
        </section>

        <section id="C" class="animal-card">
            <div class="animal-label">Cat</div>
            <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=400" alt="Cat">
            <div class="under-construction">
                <span>Under Construction</span>
                <img src="https://cdn-icons-png.flaticon.com/512/1869/1869685.png" class="uc-icon" alt="UC">
            </div>
        </section>

        <section id="D" class="animal-card">
            <div class="animal-label">Dog</div>
            <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=400" alt="Dog">
            <div class="under-construction">
                <span>Under Construction</span>
                <img src="https://cdn-icons-png.flaticon.com/512/1869/1869685.png" class="uc-icon" alt="UC">
            </div>
        </section>

        <section id="E" class="animal-card">
            <div class="animal-label">Elephant</div>
            <img src="https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?w=400" alt="Elephant">
            <audio controls>
                <source src="https://www.w3schools.com/tags/horse.mp3" type="audio/mpeg">
            </audio>
        </section>

    </main>

    <footer>
        <a href="#top" class="back-top">Back to the top of the page</a>
    </footer>

</body>
</html>
