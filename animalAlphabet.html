<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child's Animal Alphabet</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1077/1077035.png" type="image/png">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fdf6e3;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #e63946;
            font-size: 2.8rem;
            margin-bottom: 20px;
        }

        /* Navigation: A | B | C | D | E */
        nav {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 40px;
        }

        nav a {
            text-decoration: none; /* No underlines */
            color: #457b9d;
            padding: 5px 12px;
            border-radius: 8px;
            transition: 0.3s;
        }

        /* Hover effect: change background color */
        nav a:hover {
            background-color: #ffb703;
            color: #fff;
        }

        /* CSS GRID: 3 cells in each row */
        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .animal-card {
            background: #ffffff;
            border: 4px solid #a8dadc;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .animal-label {
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: #1d3557;
        }

        .animal-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        audio {
            width: 100%;
        }

        .construction {
            color: #8d99ae;
            font-style: italic;
            font-size: 0.9rem;
        }

        .construction-icon {
            width: 30px;
            height: 30px;
            margin-top: 5px;
        }

        footer {
            margin-top: 50px;
            padding-bottom: 30px;
        }

        .top-link {
            text-decoration: none;
            color: #e63946;
            font-weight: bold;
            border: 2px solid #e63946;
            padding: 8px 16px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <header id="top">
        <h1>Child's Animal Alphabet</h1>
        <nav>
            <a href="#A">A</a> | <a href="#B">B</a> | <a href="#C">C</a> | <a href="#D">D</a> | <a href="#E">E</a>
        </nav>
    </header>

    <main class="alphabet-grid">

        <section id="A" class="animal-card">
            <div class="animal-label">Anteater</div>
            <img src="https://images.unsplash.com/photo-1551009175-15bdf9dcb580?w=400" alt="Anteater">
            <audio controls>
                <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
            </audio>
        </section>
