<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child's Animal Alphabet</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1077/1077035.png" type="image/png">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f9ff;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #ff6b6b;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        /* Navigation Style: A | B | C | D | E */
        nav {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 40px;
        }

        nav a {
            text-decoration: none; /* No underlines as requested */
            color: #4cc9f0;
            padding: 5px 15px;
            border-radius: 12px;
            transition: background-color 0.3s;
        }

        /* Hover effect: change background color using CSS */
        nav a:hover {
            background-color: #ffd166;
            color: #fff;
        }

        /* CSS GRID Layout: 3 cells in each row */
        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Exactly 3 columns per row */
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }

        .animal-card {
            background: #ffffff;
            border: 4px solid #b5e48c;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .animal-label {
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #0077b6;
        }

        .animal-card img {
            width: 100%;
            max-width: 250px;
            height: 180px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 2px solid #eee;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        .under-construction {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #999;
            font-size: 0.9rem;
            font-style: italic;
        }

        .uc-icon {
            width: 40px !important;
            height: 40px !important;
            margin-top: 5px;
        }

        footer {
            margin-top: 60px;
            padding-bottom: 40px;
        }

        .back-to-top {
            text-decoration: none;
            color: #ff6b6b;
            font-weight: bold;
            font-size: 1.2rem;
            border: 3px dashed #ff6b6b;
            padding: 10px 25px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .back-to-top:hover {
            background-color: #ff6b6b;
            color: white;
        }
    </style>
</head>
<body>

    <header id="top">
        <h1>Child's Animal Alphabet</h1>
        <nav>
            <a href="#A">A</a> | <a href="#B">B</a> | <a href="#C">C</a> | <a href="#D">D</a> | <a href="#E">E</a>
        </nav>
    </header>

    <main class="alphabet-grid">

        <section id="A" class="animal-card">
            <div class="animal-label">Anteater</div>
            <img src="https://images.unsplash.com/photo-1551009175-15bdf9dcb580?w=400" alt="Anteater">
            <audio controls>
                <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
                Your browser does not support audio.
            </audio>
        </section>

        <section id="B" class="animal-card">
            <div class="animal-label">Bear</div>
            <img src="https://images.unsplash.com/photo-1530595467537-0b5996c41f2d?w=400" alt="Bear">
            <div class="under-construction">
                <span>Under Construction</span>
                <img src="https://cdn-icons-png.flaticon.com/512/1869/1869685.png" class="uc-icon" alt="Construction Icon">
            </div>
        </section>

        <section id="C" class="animal-card">
            <div class="animal-label">Cat</div>
            <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=400" alt="Cat">
            <div class="under-construction">
                <span>Under Construction</span>
                <img src="https://cdn-icons-png.flaticon.com/512/1869/1869685.png" class="uc-icon" alt="Construction Icon">
            </div>
        </section>

        <section id="D" class="animal-card">
            <div class="animal-label">Dog</div>
            <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=400" alt="Dog">
            <div class="under-construction">
                <span>Under Construction</span>
                <img src="https://cdn-icons-png.flaticon.com/512/1869/1869685.png" class="uc-icon" alt="Construction Icon">
            </div>
        </section>

        <section id="E" class="animal-card">
            <div class="animal-label">Elephant</div>
            <img src="https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?w=400" alt="Elephant">
            <audio controls>
                <source src="https://www.w3schools.com/tags/horse.mp3" type="audio/mpeg">
                Your browser does not support audio.
            </audio>
        </section>

    </main>

    <footer>
        <a href="#top" class="back-to-top">Back to the top of the page</a>
    </footer>

</body>
</html>
